<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora UPS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>🔋 Calculadora de Autonomía UPS</h1>

    <div class="form-group">
        <label>Voltaje (V)</label>
        <input type="number" id="voltaje" placeholder="Ej: 12">
    </div>

    <div class="form-group">
        <label>Capacidad (Ah)</label>
        <input type="number" id="amperaje" placeholder="Ej: 9">
    </div>

    <div class="form-group">
        <label>Consumo total (W)</label>
        <input type="number" id="consumo" placeholder="Ej: 60">
    </div>

    <div class="form-group">
        <label>Pérdidas del sistema</label>
        <select id="perdida">
            <option value="0.8">20% pérdida</option>
            <option value="0.7">30% pérdida</option>
        </select>
    </div>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado" class="resultado"></div>
</div>

<script src="script.js"></script>
</body>
</html>
